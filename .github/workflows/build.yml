name: Build-App
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: |
          GOOS=linux GOARCH=amd64 go build -o app-linux
          GOOS=windows GOARCH=amd64 go build -o app.exe
      - uses: actions/upload-artifact@v4
        with:
          name: built-binary
          path: |
            app-linux
            app.exe
